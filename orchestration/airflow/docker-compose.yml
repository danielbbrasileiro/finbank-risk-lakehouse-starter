services:
  airflow-standalone:
    image: apache/airflow:3.1.0
    container_name: finbank-airflow
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      FINBANK_PROJECT_ROOT_IN_CONTAINER: ${FINBANK_PROJECT_ROOT_IN_CONTAINER:-/opt/finbank}
    user: "${AIRFLOW_UID:-50000}:0"
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags:ro
      - ${FINBANK_PROJECT_ROOT:-../..}:${FINBANK_PROJECT_ROOT_IN_CONTAINER:-/opt/finbank}
    command: standalone
