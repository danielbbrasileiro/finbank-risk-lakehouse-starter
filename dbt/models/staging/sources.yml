version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: customers
      - name: accounts
      - name: transactions
      - name: loans
      - name: macro_indicators
      - name: ai_copilot_audit

models:
  - name: stg_customers
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
      - name: segment
        data_tests:
          - not_null

  - name: stg_transactions
    columns:
      - name: transaction_id
        data_tests:
          - unique
          - not_null
      - name: amount
        data_tests:
          - not_null

  - name: stg_loans
    columns:
      - name: loan_id
        data_tests:
          - unique
          - not_null
      - name: risk_rating
        data_tests:
          - accepted_values:
              values: ["AA", "A", "B", "C", "D", "E"]

  - name: stg_macro_indicators
    description: Normalized BCB macroeconomic indicators used for credit portfolio context.
    columns:
      - name: observation_date
        data_tests:
          - not_null
      - name: indicator_name
        data_tests:
          - not_null
          - accepted_values:
              values: ["selic", "credit_free_total"]
      - name: value
        data_tests:
          - not_null

  - name: stg_accounts
    columns:
      - name: account_id
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - not_null
      - name: status
        data_tests:
          - not_null
          - accepted_values:
              values: ["ACTIVE", "BLOCKED", "CLOSED"]
