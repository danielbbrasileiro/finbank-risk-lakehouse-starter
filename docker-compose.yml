services:
  postgres:
    image: postgres:16
    container_name: finbank-postgres
    environment:
      POSTGRES_USER: finbank
      POSTGRES_PASSWORD: finbank
      POSTGRES_DB: finbank
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/postgres_bootstrap.sql:/docker-entrypoint-initdb.d/postgres_bootstrap.sql

  minio:
    image: minio/minio:latest
    container_name: finbank-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: finbank-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: finbank-redpanda
    profiles:
      - streaming
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
    ports:
      - "9092:9092"
      - "9644:9644"

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
